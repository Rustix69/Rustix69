<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520">
  <defs>
    <style>
      @keyframes glow {
        0%,100% { filter: drop-shadow(0 0 4px #39ff14) drop-shadow(0 0 8px #39ff14); }
        50%      { filter: drop-shadow(0 0 16px #39ff14) drop-shadow(0 0 32px #1a7f37); }
      }
      @keyframes blink {
        0%,100% { opacity: 1; }
        50%      { opacity: 0; }
      }
      @keyframes scanline {
        0%   { transform: translateY(-20px); }
        100% { transform: translateY(540px); }
      }
      @keyframes flicker {
        0%,98%,100% { opacity: 1; }
        99%          { opacity: 0.88; }
      }
      .bg       { fill: #0d1117; }
      .ascii    { font-family: 'Courier New', Courier, monospace; font-size: 11.8px; fill: #39ff14; animation: glow 2.5s ease-in-out infinite; }
      .tagline  { font-family: 'Courier New', Courier, monospace; font-size: 12px; fill: #1a7f37; letter-spacing: 1.5px; }
      .cursor   { fill: #39ff14; animation: blink 1s step-end infinite; }
      .uname    { font-family: 'Courier New', Courier, monospace; font-size: 13px; fill: #58a6ff; font-weight: bold; }
      .sep      { font-family: 'Courier New', Courier, monospace; font-size: 13px; fill: #444d56; }
      .key      { font-family: 'Courier New', Courier, monospace; font-size: 13px; fill: #953800; }
      .val      { font-family: 'Courier New', Courier, monospace; font-size: 13px; fill: #0a84ff; }
      .muted    { font-family: 'Courier New', Courier, monospace; font-size: 13px; fill: #444d56; }
      .section  { font-family: 'Courier New', Courier, monospace; font-size: 12px; fill: #444d56; }
      .card     { animation: flicker 8s infinite; }
      .scan     { fill: none; stroke: rgba(57,255,20,0.06); stroke-width: 2; animation: scanline 4s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" rx="12" class="bg"/>

