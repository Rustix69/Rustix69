<!-- Light Mode Version -->
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="560" viewBox="0 0 860 560">
  <defs>
<style>
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes scanline { 0%{transform:translateY(-20px)} 100%{transform:translateY(580px)} }
  @keyframes flicker { 0%,98%,100%{opacity:1} 99%{opacity:0.96} }

  /* Background */
  .bg {
    fill: #f6f8fa;
  }

  /* ASCII / logo */
  .ascii {
    font-family: 'Courier New', monospace;
    font-size: 9.5px;
    fill: #0f6d2f; /* toned green */
  }

  /* Subtle ticker */
  .ticker {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    fill: #9ca3af;
    opacity: 0.6;
  }

  /* Tagline */
  .tagline {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    fill: #6b7280;
  }

  /* Cursor */
  .cursor {
    fill: #24292f;
    animation: blink 1s step-end infinite;
  }

  /* Username */
  .uname {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    fill: #24292f;
    font-weight: bold;
  }

  /* Separator line (dots/lines) */
  .sep {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    fill: #d1d5db;
    letter-spacing: 1px;
  }

  /* LEFT SIDE LABELS (orange like your screenshot) */
  .key {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    fill: #b45309; /* perfect warm orange */
  }

  /* RIGHT SIDE VALUES (deep blue like screenshot) */
  .val {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    fill: #1e3a8a; /* deep terminal blue */
  }

  /* Section headers */
  .section {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    fill: #6b7280;
  }

  /* Card animation */
  .card {
    animation: flicker 8s infinite;
  }

  /* Scanline effect (very subtle for light mode) */
  .scan {
    fill: none;
    stroke: rgba(0,0,0,0.04);
    stroke-width: 2;
    animation: scanline 4s linear infinite;
  }
</style>
  </defs>

  <rect width="860" height="560" rx="12" class="bg"/>
  <line x1="0" y1="0" x2="860" y2="0" class="scan"/>

  <g class="card">

